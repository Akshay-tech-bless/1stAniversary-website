<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 1st Anniversary ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Floating Hearts -->
    <div class="hearts"></div>

    <!-- Cute Cat -->
  <div class="cat-box">
    <div class="cat">🐱</div>
    <div class="speech">
        Hi Vimal! 💖<br>
        Can you complete my little game?
    </div>
</div>

    <!-- Main Card -->
    <div class="container">

        <h1>💖 Happy 1st Anniversary 💖</h1>

        <h2>Dear Vimal ❤️</h2>

        <p class="message">
            Welcome to your little surprise!<br><br>

            I made this tiny world just for you.<br>
            Every click will unlock a little piece of my heart. 💕
        </p>

        <button onclick="startGame()">
            🎁 Start Our Adventure
        </button>

    </div>

    <script src="script.js"></script>

</body>
</html>
<script src="script.js"></script>
